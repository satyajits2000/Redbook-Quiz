<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYSTRA Red Book Quiz Chatbot</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ── SYSTRA colour palette ── */
:root {
  --systra-red:   #d22328;
  --systra-dark:  #8b0000;
  --systra-light: #fdecea;
  --systra-teal:  #003e4a;
  --systra-gold:  #c8a96e;
}

body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(120deg, var(--systra-light), #fff9f9);
  margin: 0;
  padding: 20px;
}

/* ── Registration gate ── */
#reg-gate {
  max-width: 520px;
  margin: 30px auto;
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.12);
  overflow: hidden;
}
.reg-header {
  background: var(--systra-red);
  padding: 24px 28px 20px;
  text-align: center;
  position: relative;
}
.reg-header::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(45deg,transparent,transparent 18px,rgba(255,255,255,0.04) 18px,rgba(255,255,255,0.04) 36px);
}
.reg-header .systra-logo-wrap { position: relative; z-index:1; margin-bottom:10px; }
.reg-header .systra-logo-wrap img { height: 32px; filter: brightness(0) invert(1); }
.reg-header h2 { color: #fff; font-size:1.2em; font-weight:700; margin:0; position:relative;z-index:1; }
.reg-header p  { color: rgba(255,255,255,0.75); font-size:0.82em; margin:4px 0 0; position:relative;z-index:1; }

.reg-body { padding: 24px 28px 28px; }
.reg-body h3 {
  font-size: 0.85em; font-weight:700; text-transform:uppercase; letter-spacing:0.07em;
  color: var(--systra-teal); border-left: 3px solid var(--systra-red); padding-left:10px;
  margin: 0 0 18px;
}

.session-pill {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--systra-teal); color: #fff;
  padding: 5px 12px; border-radius: 20px;
  font-size: 0.78em; font-weight:600; margin-bottom:18px;
}
.live-dot {
  width:7px; height:7px; border-radius:50%; background:#4caf50;
  animation: blink 1.5s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

.field-row { margin-bottom:14px; }
.field-row label {
  display:block; font-size:0.78em; font-weight:700; text-transform:uppercase;
  letter-spacing:0.07em; color:#444; margin-bottom:5px;
}
.field-row input {
  width:100%; padding:10px 13px; border:1.5px solid #ddd; border-radius:6px;
  font-family:'Inter',sans-serif; font-size:0.92em; color:#222;
  background:#f9f6f5; box-sizing:border-box;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.field-row input:focus {
  outline:none; border-color: var(--systra-red);
  box-shadow: 0 0 0 3px rgba(210,35,40,0.1); background:#fff;
}
.field-row .optional { font-weight:400; color:#999; font-size:0.85em; text-transform:none; letter-spacing:0; }

.reg-error {
  background:#fdecea; border:1px solid #f5c2c2; color:var(--systra-red);
  padding:9px 12px; border-radius:6px; font-size:0.82em; margin-bottom:12px; display:none;
}

.btn-start {
  width:100%; padding:13px; background:var(--systra-red); color:#fff; border:none;
  border-radius:8px; font-family:'Inter',sans-serif; font-size:1em; font-weight:700;
  cursor:pointer; letter-spacing:0.04em; text-transform:uppercase;
  transition: background 0.2s, transform 0.1s;
}
.btn-start:hover  { background: var(--systra-dark); }
.btn-start:active { transform: scale(0.98); }

/* ── Chatbot container (original layout, SYSTRA colours) ── */
.chatbot-container {
  max-width: 600px;
  margin: 40px auto;
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.12);
  padding: 25px;
  display: none;
}
.chat-title { text-align:center; font-size:1.5em; margin-bottom:10px; font-weight:700; color:var(--systra-red); }

.session-bar {
  background: var(--systra-teal); color:rgba(255,255,255,0.7);
  padding: 7px 14px; font-size:0.76em; display:flex; justify-content:space-between;
  border-radius:8px; margin-bottom:12px;
}

.chat-history {
  border:1px solid #f5c2c2;
  border-radius:10px;
  background:#fdecea;
  min-height:200px; max-height:380px;
  padding:14px; overflow-y:auto;
  margin-bottom:15px; font-size:1rem;
}
.chat-message { display:flex; align-items:flex-start; margin-bottom:14px; opacity:0; animation:fadeIn 0.5s forwards; }
@keyframes fadeIn { to { opacity:1; } }
.chat-avatar { width:40px; height:40px; margin-right:12px; border-radius:50%; background:#eee; object-fit:cover; border:2px solid #f5c2c2; }
.bot-msg { background:#ffd9d9; border-radius:16px; padding:10px 14px; max-width:78%; }
.user { color:#222; font-weight:600; justify-content:flex-end; }
.user-msg { background:#f8c2c2; border-radius:16px; padding:10px 14px; max-width:78%; margin-left:auto; }

.chat-button {
  font-size:1rem;
  background: linear-gradient(90deg, var(--systra-red), #f05050);
  color:#fff; border:none; padding:10px 18px; border-radius:8px;
  cursor:pointer; margin:5px 0; width:100%; transition:0.3s;
}
.chat-button:hover {
  background: linear-gradient(90deg, var(--systra-dark), var(--systra-red));
  transform:scale(1.03);
}

.question { font-weight:700; margin-bottom:10px; font-size:1.1em; color:var(--systra-red); }
.option-list { margin:10px 0; }
.divider { border-top:2px dashed #f5c2c2; margin:20px 0 10px 0; }
.break-msg { color:#a33; margin:5px 0 12px 0; text-align:center; font-style:italic; }
.correct   { background-color:#d4edda !important; }
.incorrect { background-color:#f8d7da !important; }

/* ── Certificate section ── */
.certificate-section {
  text-align:center; background:#fff0f0; border-radius:12px; margin-top:22px;
  padding:20px 10px 16px 10px;
  box-shadow:0 2px 12px rgba(210,35,40,0.08);
}
.certificate-section input {
  font-size:1em; margin:4px 10px; padding:4px 10px;
  border-radius:6px; border:1px solid #f5c2c2;
}
#certificateCanvas {
  margin:20px auto 0 auto; display:block;
  border:1px solid #f5c2c2; background:#fff; max-width:100%;
}

.logo-container { display:flex; justify-content:center; align-items:center; margin-bottom:15px; gap:20px; flex-wrap:wrap; }
.logo-container img { height:35px; max-width:45%; object-fit:contain; border-radius:6px; transition:0.3s; }
#redbook-img { display:block; margin:6px auto; max-width:25%; height:auto; }
@media(max-width:480px){ .logo-container img{ height:28px; max-width:40%; } }

/* Firebase status pill */
#firebase-status {
  position:fixed; bottom:16px; right:16px;
  background:#fff; border-radius:20px; padding:6px 14px;
  font-size:0.76em; font-weight:600;
  box-shadow:0 4px 16px rgba(0,0,0,0.15);
  display:flex; align-items:center; gap:6px; z-index:100;
}
.f-dot { width:8px; height:8px; border-radius:50%; background:#ffc107; }
.f-dot.ok    { background:#4caf50; }
.f-dot.err   { background:var(--systra-red); }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<!-- ══════════════════════════════════════════════
     REGISTRATION GATE
══════════════════════════════════════════════ -->
<div id="reg-gate">
  <div class="reg-header">
    <div class="systra-logo-wrap">
      <img src="systra-logo.png" alt="SYSTRA">
    </div>
    <h2>Red Book Quiz Chatbot</h2>
    <p>Quality Days · IMS Knowledge Assessment</p>
  </div>
  <div class="reg-body">
    <div class="session-pill">
      <span class="live-dot"></span>
      <span id="session-name-display">Loading session…</span>
    </div>

    <h3>Your Details</h3>

    <div id="reg-error" class="reg-error">Please fill in your Name and Entity to proceed.</div>

    <div class="field-row">
      <label>Full Name <span style="color:var(--systra-red)">*</span></label>
      <input type="text" id="reg-name" placeholder="Enter your full name">
    </div>
    <div class="field-row">
      <label>Entity / Business Unit <span style="color:var(--systra-red)">*</span></label>
      <input type="text" id="reg-entity" placeholder="e.g. SYSTRA India, SYSTRA France…">
    </div>
    <div class="field-row">
      <label>Department <span class="optional">(optional)</span></label>
      <input type="text" id="reg-dept" placeholder="e.g. Internal Control, Finance…">
    </div>
    <div class="field-row">
      <label>Email <span class="optional">(optional)</span></label>
      <input type="email" id="reg-email" placeholder="your.name@systra.com">
    </div>

    <button class="btn-start" onclick="startQuiz()">Start Red Book Quiz →</button>
  </div>
</div>

<!-- ══════════════════════════════════════════════
     CHATBOT CONTAINER  (original structure)
══════════════════════════════════════════════ -->
<div class="chatbot-container" id="chatbot-container">
  <div class="logo-container">
    <img src="systra-logo.png" alt="SYSTRA Logo">
    <img src="dci-logo.png"    alt="DCI Logo">
  </div>
  <div class="chat-title">SYSTRA Red Book Quiz Chatbot</div>
  <img src="Dcy_redbook_1.png" id="redbook-img" alt="Red Book Image">

  <div class="session-bar">
    <span><span class="live-dot"></span> Live Tracking Active</span>
    <span id="participant-bar">—</span>
    <span id="score-bar">Score: 0</span>
  </div>

  <div class="chat-history" id="chat-history"></div>
  <div id="chat-options" class="option-list"></div>

  <div id="certificateSection" class="certificate-section" style="display:none;">
    <div><b>🎓 Download your Certificate</b></div>
    <label>Name: <input type="text" id="userName" placeholder="Your Name"></label>
    <label>Date: <input type="text" id="certDate" style="width:140px;"></label><br>
    <button id="generateCertificate" class="chat-button" style="max-width:230px;">Show Certificate</button>
    <canvas id="certificateCanvas" width="700" height="480" style="display:none;"></canvas><br>
    <button id="downloadCertificate"    class="chat-button" style="display:none;">Download PNG</button>
    <button id="downloadPdfCertificate" class="chat-button" style="display:none;">Download PDF</button>
  </div>
</div>

<div id="firebase-status">
  <div class="f-dot" id="f-dot"></div>
  <span id="f-label">Connecting…</span>
</div>

<!-- ══════════════════════════════════════════════
     FIREBASE  (module)
══════════════════════════════════════════════ -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, push, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* ──────────────────────────────────────────────────────────────
   🔥  FIREBASE CONFIGURATION
   Replace the placeholder values below with your Firebase project
   credentials from:
   Firebase Console → Project Settings → Your Apps → Web App

   Steps to get these values:
   1. Go to https://console.firebase.google.com
   2. Create / open your project
   3. Click the </> Web icon → Register app
   4. Copy the firebaseConfig object shown
   5. Paste the values here
──────────────────────────────────────────────────────────────── */
const firebaseConfig = {
  apiKey:            "YOUR_API_KEY",
  authDomain:        "YOUR_PROJECT_ID.firebaseapp.com",
  databaseURL:       "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
  projectId:         "YOUR_PROJECT_ID",
  storageBucket:     "YOUR_PROJECT_ID.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId:             "YOUR_APP_ID"
};

let db, participantRef = null, sessionId = 'offline_' + Date.now();

try {
  const app = initializeApp(firebaseConfig, 'redbook-quiz');
  db = getDatabase(app);
  document.getElementById('f-dot').className = 'f-dot ok';
  document.getElementById('f-label').textContent = 'Firebase Connected';
} catch(e) {
  document.getElementById('f-dot').className = 'f-dot err';
  document.getElementById('f-label').textContent = 'Offline Mode';
}

// Load active session
async function loadSession() {
  try {
    const snap = await get(ref(db, 'sessions'));
    if (snap.exists()) {
      const active = Object.entries(snap.val()).find(([,v]) => v.status === 'active');
      if (active) { sessionId = active[0]; document.getElementById('session-name-display').textContent = active[1].name; return; }
    }
    document.getElementById('session-name-display').textContent = 'General Session';
    sessionId = 'general';
  } catch { document.getElementById('session-name-display').textContent = 'No Active Session'; }
}
if (db) loadSession();

window.firebaseRegister = async function(data) {
  if (!db) return null;
  try {
    const r = push(ref(db, `sessions/${sessionId}/participants`));
    participantRef = r;
    await set(r, data);
    return r.key;
  } catch { return null; }
};

window.firebaseUpdate = async function(data) {
  if (!participantRef) return;
  try { await set(participantRef, data); } catch {}
};
</script>

<!-- ══════════════════════════════════════════════
     QUIZ LOGIC  (original questions + flow)
══════════════════════════════════════════════ -->
<script>
// ── original quiz data ────────────────────────────────────────────────────────
const quizData = [
{ question:"Integrated Management System in Systra is structured Minimum along how many Core Processes?", options:["10, like fingers but not always this is the right number","9, easy number to retain, no?","8, We tried, but nobody could find the procedures anymore."], answer:1, feedback:"", citation:"" },
{ question:"Your colleague asks you: 'What exactly is the Red Book? A red book?' You take a deep breath and answer:", options:["Framework structured based on Core processes of the Group","List of questions to be answered during the project execution","List of documents to be known and applied"], answer:0, feedback:"", citation:"" },
{ question:"The colleague panics: 'Where do I find the Red Book?!' You stay calm and you say:", options:["Group Communication web site","On the request sent to Ethics department","MySMI, Internal Control System"], answer:2, feedback:"", citation:"" },
{ question:"Compliance with the Red Book is assessed regularly via:", options:["Group Process Pilots questionnaires","Red Book days organized in every Business Unit (coffee is mandatory)","Group Self-assessment campaigns"], answer:2, feedback:"", citation:"Good news: none of these involve an escape room😊" },
{ question:"Assessment of the compliance is based on:", options:["Red procedures within the process Strategy and performance","Maturity Grids published in MySMI","Group Internal Control Framework"], answer:1, feedback:"", citation:"" },
{ question:"What is the maturity level / rating representing compliance with the requirement?", options:["4","2,5","3"], answer:2, feedback:"", citation:"" },
{ question:"Your colleagues is not sure What the Red Procedure is, you help them by saying:", options:["Document defined by Group Internal Control","Policy that structure engagement","Compulsory mandatory procedure that must be respected by every Business Unit and entity"], answer:2, feedback:"", citation:"Yes, mandatory. Even on Friday afternoons 😊" },
{ question:"What should entity do if there is no RED procedure for a given process requirement?", options:["Ignore the requirement","Develop its own local procedure, using the guidelines and templates available in the SMI, then publish it in MySMI.","Simply print the existing documents and keep them in a binder"], answer:1, feedback:"", citation:"This is often the right approach 😊" },
{ question:"In what process you can find the Policies of the Group?", options:["Communication","Legal","Strategy and Performance"], answer:2, feedback:"", citation:"" },
{ question:"Select the correct status:", options:["Anticorruption risk assessment is one of the requirements in Legal process.","Anticorruption Risk assessment in Strategy and Performance process","Technical risk assessment in Working environment process"], answer:1, feedback:"", citation:"" },
{ question:"Select the correct status: Sustainability references", options:["Sustainability services within Project Delivery Guide","Sustainability Charter in Strategy & Performance process","Sustainability engagements in Group IMS Charter"], answer:0, feedback:"", citation:"Do not forget, we want sustainability to be part of our projects 😊" },
{ question:"Select correct status – 'Working in the field'", options:["Referenced in Information Security process","Referenced in Working Environment process","Structured within 3S Policy"], answer:1, feedback:"", citation:"" },
{ question:"Select correct status – following Red Procedures are referenced in Red Book:", options:["Bid strategy, Governance of data, Working in the Field, Fitness to Travel, Quality controls in Production","Quality Controls in Production, Working in the Field, Fitness to Travel, Governance of Information, Group CDO","Fitness to Health, Quality Controls in Production, Working in the Field, Group CDO"], answer:1, feedback:"", citation:"" },
{ question:"In which process can you find the requirement to respect process Compass?", options:["Working environment","IT and data security","Strategy and Performance"], answer:2, feedback:"", citation:"Sailors use the compass to find the right direction in the sea 😊" },
{ question:"What are the sections you can find in MySMI library?", options:["My Entity documentation, Internal Control System, NOGs, Process structure","Group Documents, Internal Control System, NOGs, Process structure","Group Documents, Entities documents, Internal Control System, Process structure"], answer:0, feedback:"", citation:"Check the welcome page on MySMI 😊" },
{ question:"Who oversees updating, publishing and communicating the Red Book across the Group?", options:["Process Pilot of Strategy and Performance process","Ethics and Compliance department","Group Internal Control"], answer:2, feedback:"", citation:"They probably sleep with a Maturity Grid under their pillow 😊" }
];

let currentQuestion = 0, totalCorrect = 0;
const chatHistory = document.getElementById('chat-history');
const optionsDiv  = document.getElementById('chat-options');
const totalQ      = quizData.length;

let participantMeta = {};

// ── original logo base64 strings (kept exactly as in original file) ───────────
/* These will be read from the image files placed next to this HTML */

// ── registration → start quiz ─────────────────────────────────────────────────
function startQuiz() {
  const name   = document.getElementById('reg-name').value.trim();
  const entity = document.getElementById('reg-entity').value.trim();
  if (!name || !entity) {
    document.getElementById('reg-error').style.display = 'block';
    return;
  }

  participantMeta = {
    name, entity,
    dept  : document.getElementById('reg-dept').value.trim(),
    email : document.getElementById('reg-email').value.trim(),
    quiz  : 'redbook',
    startTime : new Date().toISOString(),
    score : 0, progress : 0, status : 'in_progress', answers: []
  };

  if (window.firebaseRegister) window.firebaseRegister(participantMeta);

  document.getElementById('reg-gate').style.display      = 'none';
  document.getElementById('chatbot-container').style.display = 'block';
  document.getElementById('participant-bar').textContent  = name;
  document.getElementById('userName').value = name;
  document.getElementById('certDate').value = new Date().toLocaleDateString();

  showWelcome();
}

// ── add message (original) ─────────────────────────────────────────────────────
function addMessage(message, sender='bot') {
  const msgDiv = document.createElement('div');
  msgDiv.classList.add('chat-message');
  if (sender === 'bot') {
    msgDiv.innerHTML = `<img src="chatbot.jpg" class="chat-avatar" alt="bot"><div class="bot-msg">${message}</div>`;
  } else {
    msgDiv.classList.add('user');
    msgDiv.innerHTML = `<div class="user-msg">${message}</div>`;
  }
  chatHistory.appendChild(msgDiv);
  chatHistory.scrollTop = chatHistory.scrollHeight;
}

function addDivider() {
  const div = document.createElement('div');
  div.className = 'divider';
  chatHistory.appendChild(div);
}

// ── show question (original) ──────────────────────────────────────────────────
function showQuestion() {
  const q = quizData[currentQuestion];
  optionsDiv.innerHTML = '';
  addDivider();
  addMessage(`<span class="question">Question ${currentQuestion+1}/${totalQ}: ${q.question}</span>`);
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'chat-button';
    btn.innerText = opt;
    btn.onclick = () => {
      addMessage(opt, 'user');
      const correct = (i === q.answer);
      if (correct) { btn.classList.add('correct'); totalCorrect++; addMessage("✅ Correct!"); }
      else         { btn.classList.add('incorrect'); addMessage("❌ Incorrect! Correct answer: " + q.options[q.answer]); }
      if (q.citation) addMessage("📌 " + q.citation);

      // disable all buttons
      optionsDiv.querySelectorAll('button').forEach(b => b.disabled = true);

      // update score bar
      document.getElementById('score-bar').textContent = `Score: ${totalCorrect}`;

      // Firebase live update
      const answers = [...(participantMeta.answers || []), {q: currentQuestion, correct}];
      participantMeta = { ...participantMeta, score: totalCorrect, progress: currentQuestion + 1, answers };
      if (window.firebaseUpdate) window.firebaseUpdate(participantMeta);

      setTimeout(() => { nextQuestion(); }, 4000);
      optionsDiv.innerHTML = '';
    };
    optionsDiv.appendChild(btn);
  });
}

// ── next question (original) ──────────────────────────────────────────────────
function nextQuestion() {
  currentQuestion++;
  if (currentQuestion >= quizData.length) {
    optionsDiv.innerHTML = '';
    addDivider();
    addMessage(`<b>🎉 Quiz finished!</b> You answered <b>${totalCorrect}</b> questions correctly out of ${totalQ}.`);

    // final Firebase update
    participantMeta.status    = 'completed';
    participantMeta.endTime   = new Date().toISOString();
    participantMeta.finalScore = totalCorrect;
    if (window.firebaseUpdate) window.firebaseUpdate(participantMeta);

    document.getElementById('certificateSection').style.display = 'block';
    document.getElementById('certDate').value = new Date().toLocaleDateString();
  } else {
    showQuestion();
  }
}

function drawCertificate(name, date, score, maxScore) {
    const canvas = document.getElementById('certificateCanvas');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Background and border
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = "#b30000";
    ctx.lineWidth = 6;
    ctx.strokeRect(25, 25, canvas.width - 50, canvas.height - 50);

    // Top: SYSTRA logo
    const topImg = new Image();
    topImg.onload = function() {
        const targetW = 150; // width of logo
        const scale = targetW / topImg.naturalWidth;
        const targetH = topImg.naturalHeight * scale;
        ctx.drawImage(topImg, (canvas.width - targetW) / 2, 40, targetW, targetH);

        // Certificate text
        ctx.font = "bold 34px Inter";
        ctx.fillStyle = "#b30000";
        ctx.textAlign = "center";
        ctx.fillText("Certificate of Completion", canvas.width / 2, 120);

        ctx.font = "20px Inter";
        ctx.fillStyle = "#222";
        ctx.fillText("This certifies that", canvas.width / 2, 160);

        ctx.font = "bold 26px Inter";
        ctx.fillStyle = "#b30000";
        ctx.fillText(name, canvas.width / 2, 200);

        ctx.font = "20px Inter";
        ctx.fillStyle = "#222";
        ctx.fillText(`has successfully completed the SYSTRA Red Book Quiz`, canvas.width / 2, 240);

        ctx.font = "18px Inter";
        ctx.fillStyle = "#222";
        ctx.fillText(`Date: ${date} | Score: ${score} / ${maxScore}`, canvas.width / 2, 270);

        // Bottom: Muskat logo
        const bottomImg = new Image();
        bottomImg.onload = function() {
            const targetW = 140;
            const scale = targetW / bottomImg.naturalWidth;
            const targetH = bottomImg.naturalHeight * scale;
            ctx.drawImage(bottomImg, (canvas.width - targetW) / 2, canvas.height - 40 - targetH, targetW, targetH);

            // Show download buttons
            document.getElementById('downloadCertificate').style.display = 'inline-block';
            document.getElementById('downloadPdfCertificate').style.display = 'inline-block';
            canvas.style.display = 'block';
        };
        bottomImg.src = muskatLogoBase64;
    };
    topImg.src = systraLogoBase64;
}


document.getElementById('generateCertificate').onclick = function() {
  const name = document.getElementById('userName').value || participantMeta.name || "Participant";
  const date = document.getElementById('certDate').value || new Date().toLocaleDateString();
  drawCertificate(name, date, totalCorrect, totalQ);
};

document.getElementById('downloadCertificate').onclick = function() {
  const canvas = document.getElementById('certificateCanvas');
  const link   = document.createElement('a');
  link.href     = canvas.toDataURL('image/png');
  link.download = 'certificate.png';
  link.click();
};

document.getElementById('downloadPdfCertificate').onclick = function() {
  const canvas  = document.getElementById('certificateCanvas');
  const imgData = canvas.toDataURL('image/png');
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ orientation:'landscape', unit:'px', format:[canvas.width, canvas.height] });
  pdf.addImage(imgData, 'PNG', 0, 0, canvas.width, canvas.height);
  pdf.save('certificate.pdf');
};

// ── Welcome messages (original) ────────────────────────────────────────────────
const welcomeLines = [
  "Welcome to the quiz that makes people enjoy Red Book within IMS (yes… really… it is possible).",
  "Instructions:",
  "👉 Each question is based on real-life SYSTRA situations.",
  "👉 Answer as if your BU Director, Internal Control, and the MySMI mascot were watching you…",
  "👉 Smile: you're learning."
];

function showWelcome(index = 0) {
  if (index < welcomeLines.length) {
    addMessage(welcomeLines[index]);
    setTimeout(() => showWelcome(index + 1), 4000);
  } else {
    setTimeout(showQuestion, 800);
  }
}
